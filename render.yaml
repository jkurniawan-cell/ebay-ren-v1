services:
  # Flask Backend API
  - type: web
    name: ebay-ren-api
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -c gunicorn_config.py app:app"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: ebay-ren-db
          property: connectionString
      - key: AIRTABLE_API_KEY
        sync: false  # You'll set this manually in dashboard
      - key: AIRTABLE_BASE_ID
        value: appXFsy8DcRl4C5mx
      - key: CACHE_TTL_SECONDS
        value: 3600
      - key: PORT
        value: 10000

# PostgreSQL Database (Free tier)
databases:
  - name: ebay-ren-db
    plan: free
    databaseName: ebay_ren
    user: ebay_ren_user
